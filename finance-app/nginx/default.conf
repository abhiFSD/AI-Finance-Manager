# Default server configuration
server {
    listen 80;
    listen [::]:80;
    server_name financeapp.com www.financeapp.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name financeapp.com www.financeapp.com;

    # SSL configuration
    ssl_certificate /etc/ssl/certs/financeapp.com.crt;
    ssl_certificate_key /etc/ssl/certs/financeapp.com.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_ecdh_curve secp384r1;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Remove server header
    server_tokens off;
    
    # Connection limits
    limit_conn conn_limit_per_ip 20;

    # Root directory for static files
    root /var/www/html;
    index index.html;

    # Rate limiting for different endpoints
    location /api/auth/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        # Cache API responses
        proxy_cache api_cache;
        proxy_cache_valid 200 301 302 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        # Add cache status header
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Static files with aggressive caching
    location /_next/static/ {
        proxy_cache static_cache;
        proxy_cache_valid 200 301 302 1y;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Images and media files
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        proxy_cache static_cache;
        proxy_cache_valid 200 301 302 30d;
        
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Fonts
    location ~* \.(woff|woff2|eot|ttf|otf)$ {
        proxy_cache static_cache;
        proxy_cache_valid 200 301 302 1y;
        
        add_header Cache-Control "public, max-age=31536000";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Service Worker
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Manifest
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Health check endpoint (bypass cache)
    location /api/health {
        access_log off;
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # WebSocket support
    location /socket.io/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        proxy_pass http://app_servers;
    }

    # Default application routes
    location / {
        limit_req zone=general burst=10 nodelay;
        
        # Try files first, then proxy to app
        try_files $uri $uri/ @app;
    }

    # Proxy to application
    location @app {
        proxy_pass http://app_servers;
        include /etc/nginx/proxy_params.conf;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to common exploit paths
    location ~* (wp-admin|wp-login|xmlrpc.php) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /var/www/html;
    }

    location = /404.html {
        root /var/www/html;
    }
}

# Status page for monitoring
server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;
    
    access_log off;
    
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker network
        deny all;
    }
    
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}