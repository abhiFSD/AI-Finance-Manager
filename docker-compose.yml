version: '3.8'

services:
  # Frontend React App
  frontend:
    build:
      context: ./finance-frontend
      dockerfile: Dockerfile.dev
    container_name: finance-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./finance-frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - finance-app
    stdin_open: true
    tty: true

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: finance-backend
    ports:
      - "3001:3001"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./.env:/app/.env
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./logs:/app/logs
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=your-secret-key-change-this-in-production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - VIRUS_SCAN_ENABLED=false
      - LOG_LEVEL=info
      - UPLOAD_DIR=/app/uploads
      - TEMP_DIR=/app/temp
    depends_on:
      - redis
      - postgres
    networks:
      - finance-app

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: finance-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=finance_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-app

  # Redis for Bull queue and caching
  redis:
    image: redis:7-alpine
    container_name: finance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - finance-app

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: finance-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-app

  # Background worker for document processing
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: finance-worker
    command: npm run worker
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - VIRUS_SCAN_ENABLED=false
      - LOG_LEVEL=info
      - UPLOAD_DIR=/app/uploads
      - TEMP_DIR=/app/temp
      - QUEUE_CONCURRENCY=3
    volumes:
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - finance-app

  # Redis monitoring (optional - use with --profile monitoring)
  redis-commander:
    image: rediscommander/redis-commander:latest
    hostname: redis-commander
    container_name: finance-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - finance-app
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  finance-app:
    driver: bridge